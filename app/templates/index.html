<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tax Filing Assistant</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main id="chat-root" class="chat-shell">
      <section class="chat-panel" aria-label="Tax filing chat">
        <header class="chat-header">
          <h1>Tax Filing Assistant</h1>
        </header>
        <div id="messages" class="messages" aria-live="polite"></div>
        <form id="chat-form" class="chat-form">
          <input id="message-input" name="message" type="text" autocomplete="off" placeholder="Message">
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
